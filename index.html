<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光・宇宙・政治 ニュースポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--red:#dc2626;--red-lt:#fef2f2;--purple:#7c3aed;--green:#059669;--blue:#2563eb;--bg:#f1f3f6;--white:#fff;--border:#e2e5ea;--text:#111827;--muted:#6b7280;--side:210px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading.out{opacity:0;pointer-events:none}
.ld-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--red),#f87171);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:16px;animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.ld-text{font-size:13px;color:var(--muted);margin-bottom:14px}
.ld-bar{width:160px;height:3px;background:#f3f4f6;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--red);border-radius:2px;animation:ldf 1.6s ease-in-out infinite}
@keyframes ldf{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.hdr{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--red),#f87171);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.04em}
.hdr-sub{font-size:10px;color:var(--muted);margin-left:4px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.hdr-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.wrap{display:flex;flex:1;min-height:0}
.side{width:var(--side);flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto}
.side-inner{padding:14px 12px;display:flex;flex-direction:column;gap:14px}
.side-date-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.side-date-val{font-size:20px;font-weight:700;font-family:'Oswald',sans-serif;line-height:1.1}
.side-badge{display:none;align-items:center;gap:4px;font-size:10px;color:var(--red);font-weight:600;margin-top:4px}
.side-badge.on{display:flex}
.side-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red)}
.conn-ok{font-size:10px;color:var(--green);margin-top:4px;display:none}
.conn-ok.on{display:block}
.conn-err{font-size:10px;color:var(--red);margin-top:4px;line-height:1.5;display:none}
.conn-err.on{display:block}
.cal{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#fafafa;border-bottom:1px solid var(--border)}
.cal-hd-lbl{font-size:12px;font-weight:700;font-family:'Oswald',sans-serif}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;border-radius:5px;line-height:1;transition:background .1s}
.cal-nav:hover{background:#f3f4f6;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 6px 8px;gap:2px}
.cal-dh{text-align:center;font-size:9px;color:var(--muted);padding:2px 0;font-weight:600}
.cal-cell{text-align:center;font-size:10px;color:#c9cdd5;padding:5px 1px;border-radius:5px;cursor:default;line-height:1;position:relative;transition:background .1s}
.cal-cell.has{color:var(--text);cursor:pointer;font-weight:600}
.cal-cell.has:hover{background:var(--red-lt);color:var(--red)}
.cal-cell.sel{background:var(--red)!important;color:#fff!important;font-weight:700}
.cal-cell.today:not(.sel){outline:1.5px solid var(--red);color:var(--red);font-weight:600}
.cal-cell.has:not(.sel)::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--red)}
.cal-leg{display:flex;gap:10px;padding:3px 8px 7px;font-size:9px;color:var(--muted)}
.cal-leg span{display:flex;align-items:center;gap:3px}
.leg-dot{width:5px;height:5px;border-radius:50%;background:var(--red)}
.leg-sq{width:9px;height:9px;border-radius:2px;outline:1.5px solid var(--red)}
.sb-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:8px}
.pdf-card{background:#fafafa;border:1px solid var(--border);border-radius:9px;padding:9px 10px;margin-bottom:7px}
.pdf-card-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pdf-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pdf-ico.t{background:#dbeafe}.pdf-ico.p{background:#fce7f3}
.pdf-name{font-size:10px;color:#374151;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:118px}
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:6px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;transition:opacity .15s;text-decoration:none}
.pdf-btn:hover{opacity:.85}
.pdf-btn.off{background:#d1d5db;cursor:not-allowed;pointer-events:none}
.audio-card{background:#fafafa;border:1px solid var(--border);border-radius:9px;padding:9px 10px}
.audio-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.audio-ico{width:30px;height:30px;background:#f3e8ff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.audio-name{font-size:10px;color:#374151;line-height:1.4}
.audio-none{font-size:11px;color:var(--muted);text-align:center;padding:12px 0}.audio-card{background:#fafafa;border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:0}.audio-card iframe{width:100%;height:80px;border:none;border-radius:6px;display:block}.aplayer{background:#f5f0ff;border:1.5px solid #c4b5fd;border-radius:10px;padding:12px 10px}.aplayer-title{font-size:10px;color:#6d28d9;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}.aplayer-row1{display:flex;align-items:center;gap:8px;margin-bottom:10px}.aplay-btn{width:36px;height:36px;border-radius:50%;background:#7c3aed;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;color:#fff;font-size:15px;box-shadow:0 2px 6px rgba(124,58,237,.4)}.aplay-btn:hover{background:#6d28d9;transform:scale(1.05)}.aplay-btn:active{transform:scale(.95)}.atime-wrap{display:flex;flex-direction:column;flex:1;gap:6px}.abar-wrap{position:relative;height:28px;display:flex;align-items:center;cursor:pointer;border-radius:14px;background:#ede9fe;padding:0 2px}.abar-bg{width:100%;height:6px;background:#ddd6fe;border-radius:3px;pointer-events:none}.abar-fill{position:absolute;left:2px;height:6px;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:3px;width:0%;pointer-events:none;transition:width .1s linear}.abar-thumb{width:16px;height:16px;border-radius:50%;background:#7c3aed;position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 1px 4px rgba(124,58,237,.5);transition:left .1s linear}.abar-hit{position:absolute;inset:0;cursor:pointer;border-radius:14px}.atime{font-size:10px;color:#6d28d9;font-weight:600;text-align:right;letter-spacing:.03em}.amute-btn{width:28px;height:28px;border-radius:7px;background:#ede9fe;border:1.5px solid #c4b5fd;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;color:#7c3aed;font-size:13px}.amute-btn:hover{background:#ddd6fe}.adrive-link{display:block;text-align:center;font-size:9px;color:#a78bfa;text-decoration:none;margin-top:6px;padding:3px;border-radius:4px}.adrive-link:hover{color:#7c3aed;background:#f5f3ff}

.main{flex:1;min-width:0;padding:16px 20px;overflow-y:auto}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:22px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;color:#374151;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.tab:hover{border-color:var(--red);color:var(--red)}
.tab.act{color:#fff;border-color:transparent}
.tab[data-i="0"].act{background:var(--red)}
.tab[data-i="1"].act{background:var(--purple)}
.tab[data-i="2"].act{background:var(--green)}
.tab[data-i="3"].act{background:var(--blue)}
.tab-ico{font-size:13px}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:9px;font-size:10px;font-weight:700;background:rgba(0,0,0,.12)}
.tab.act .tab-badge{background:rgba(255,255,255,.28)}
.panel{display:none}.panel.act{display:block;animation:fin .2s}
@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.kw-bar{background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kw-ico{color:var(--muted);font-size:12px;flex-shrink:0}
.kw-tag{font-size:11px;color:#4b5563;padding:1px 0}
.kw-sep{color:#d1d5db}
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
@media(max-width:1080px){.ngrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.ngrid{grid-template-columns:1fr}}
.ncard{background:var(--white);border:1px solid var(--border);border-radius:11px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,transform .15s}
.ncard:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px)}
.ncard-body{padding:13px;flex:1;display:flex;flex-direction:column}
.ncard-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ntag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.ntag.t0{background:#fef2f2;color:var(--red)}.ntag.t1{background:#f5f3ff;color:var(--purple)}.ntag.t2{background:#ecfdf5;color:var(--green)}.ntag.t3{background:#eff6ff;color:var(--blue)}
.nmedia{font-size:10px;color:var(--muted)}
.ntitle{font-size:13px;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:7px}
.nbody{font-size:11px;color:#4b5563;line-height:1.8;margin-bottom:8px;flex:1}
.ninsight{background:#eff6ff;border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:7px 9px;margin-bottom:8px;font-size:11px;color:#1e3a8a;line-height:1.7}
.ninsight::before{content:'☞ ';font-weight:700}
.nurl{font-size:10px;color:var(--muted);word-break:break-all;margin-top:auto}
.nurl a{color:var(--muted);text-decoration:none}.nurl a:hover{color:var(--red)}
.no-news{grid-column:1/-1;text-align:center;padding:52px 20px;color:var(--muted)}
.no-news-ico{font-size:44px;margin-bottom:10px;opacity:.3}
.charts-sec{margin-bottom:8px}
.charts-hd{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.charts-hd::before{content:'';width:3px;height:14px;background:var(--red);border-radius:2px}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:12px}
.chart-card-ttl{font-size:12px;font-weight:700;color:#374151;margin-bottom:2px}
.chart-card-sub{font-size:10px;color:var(--muted);margin-bottom:12px}
.chart-wrap{height:220px;position:relative}
</style>
</head>
<body>
<div id="loading"><div class="ld-logo">☀</div><div class="ld-text">ニュースを読み込んでいます...</div><div class="ld-bar"><div class="ld-fill"></div></div></div>
<header class="hdr">
  <div class="hdr-logo">☀</div>
  <h1>光・宇宙・政治 ニュースポータル</h1>
  <span class="hdr-sub">光学 / 宇宙・防衛 / 国内政治 / 海外政治</span>
  <div class="hdr-right"><div class="hdr-live"></div><span>日別ニュース</span></div>
</header>
<div class="wrap">
  <aside class="side"><div class="side-inner">
    <div>
      <div class="side-date-lbl">選択中の日付</div>
      <div class="side-date-val" id="sideDate">—</div>
      <div class="side-badge" id="sideBadge">レポートあり（<span id="topicCnt">0</span>件）</div>
      <div class="conn-ok" id="connOk"></div>
      <div class="conn-err" id="connErr"></div>
    </div>
    <div class="cal">
      <div class="cal-hd"><button class="cal-nav" id="calPrev">‹</button><span class="cal-hd-lbl" id="calLbl"></span><button class="cal-nav" id="calNext">›</button></div>
      <div class="cal-grid">
        <div class="cal-dh">日</div><div class="cal-dh">月</div><div class="cal-dh">火</div><div class="cal-dh">水</div><div class="cal-dh">木</div><div class="cal-dh">金</div><div class="cal-dh">土</div>
        <div id="calDates" style="display:contents"></div>
      </div>
      <div class="cal-leg"><span><div class="leg-dot"></div>データあり</span><span><div class="leg-sq"></div>今日</span></div>
    </div>
    <div>
      <div class="sb-lbl">🎙 音声解説</div>
      <div class="audio-card">
        <div id="audioWrap"><div class="audio-none">音声なし</div></div>
      </div>
    </div>
    <div>
      <div class="sb-lbl">📄 PDFダウンロード</div>
      <div class="pdf-card"><div class="pdf-card-top"><div class="pdf-ico t">📘</div><div class="pdf-name" id="pdfTechName">技術系レポート</div></div><a class="pdf-btn off" id="pdfTechBtn" target="_blank">⬇ ダウンロード</a></div>
      <div class="pdf-card"><div class="pdf-card-top"><div class="pdf-ico p">📕</div><div class="pdf-name" id="pdfPolName">政治情勢レポート</div></div><a class="pdf-btn off" id="pdfPolBtn" target="_blank">⬇ ダウンロード</a></div>
    </div>
  </div></aside>
  <main class="main">
    <div class="tabs">
      <button class="tab act" data-i="0"><span class="tab-ico">☀</span>光学・光アプリケーション<span class="tab-badge" id="b0">0</span></button>
      <button class="tab" data-i="1"><span class="tab-ico">🛰</span>宇宙・防衛・核融合<span class="tab-badge" id="b1">0</span></button>
      <button class="tab" data-i="2"><span class="tab-ico">🏛</span>国内政治<span class="tab-badge" id="b2">0</span></button>
      <button class="tab" data-i="3"><span class="tab-ico">🌐</span>海外政治<span class="tab-badge" id="b3">0</span></button>
    </div>
    <div class="panel act" id="p0"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw0" style="display:contents"></span></div><div class="ngrid" id="ng0"></div><div class="charts-sec" id="ch0"></div></div>
    <div class="panel" id="p1"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw1" style="display:contents"></span></div><div class="ngrid" id="ng1"></div><div class="charts-sec" id="ch1"></div></div>
    <div class="panel" id="p2"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw2" style="display:contents"></span></div><div class="ngrid" id="ng2"></div><div class="charts-sec" id="ch2"></div></div>
    <div class="panel" id="p3"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw3" style="display:contents"></span></div><div class="ngrid" id="ng3"></div><div class="charts-sec" id="ch3"></div></div>
  </main>
</div>
<script>
const SHEET_ID='1D5GDqcSrJj6_SGk3OlnTDqoBL0su03t9Yi5McGTb578';
const BASE=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
const THEMES=[
  {key:'optics',  label:'光学',    cls:'t0',kws:['フォトニクス','シリコンフォトニクス','光電融合','LiDAR','CPO']},
  {key:'space',   label:'宇宙',    cls:'t1',kws:['衛星','防衛','核融合','レーザー','宇宙開発']},
  {key:'domestic',label:'国内政治',cls:'t2',kws:['国会','閣議','与党','野党','経済安保']},
  {key:'intl',    label:'海外政治',cls:'t3',kws:['米中','欧州','地政学','輸出規制','外交']},
];
const PAL=['#dc2626','#2563eb','#059669','#f59e0b','#7c3aed','#0891b2'];
let curDate=null,availDates=[],calY,calM,allRows=[],allChartRows=[],allMediaRows=[];
const CI={};

// CSV Parser（\r\n対応）
function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const hdr=csvLine(lines[0]);
  return lines.slice(1).map(l=>{
    const f=csvLine(l),o={};
    hdr.forEach((h,i)=>{o[h]=(f[i]||'').trim();});
    return o;
  }).filter(r=>r.date&&/^\d{4}-\d{2}-\d{2}$/.test(r.date));
}
function csvLine(l){
  const f=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    const ch=l[i];
    if(ch==='"'&&!q){q=true;}
    else if(ch==='"'&&q&&l[i+1]==='"'){c+='"';i++;}
    else if(ch==='"'&&q){q=false;}
    else if(ch===','&&!q){f.push(c);c='';}
    else{c+=ch;}
  }
  f.push(c);return f.map(s=>s.trim());
}

async function fetchSheet(name){
  const r=await fetch(`${BASE}&sheet=${encodeURIComponent(name)}`);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const t=await r.text();
  if(t.trim().startsWith('<!'))throw new Error('HTMLが返却されました（スプレッドシートの共有設定を確認してください）');
  return t;
}

async function loadAll(){
  allRows=parseCSV(await fetchSheet('articles'));
  try{allChartRows=parseCSV(await fetchSheet('charts'));}catch(e){allChartRows=[];}
  try{allMediaRows=parseCSV(await fetchSheet('media'));}catch(e){allMediaRows=[];}
  availDates=[...new Set(allRows.map(r=>r.date))].sort();
  const ok=document.getElementById('connOk');
  ok.textContent=`✓ ${allRows.length}件 / ${availDates.length}日分`;
  ok.classList.add('on');
}

// Calendar
function initCal(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function renderCal(){
  document.getElementById('calLbl').textContent=`${calY}年${calM+1}月`;
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  const today=new Date(),grid=document.getElementById('calDates');
  grid.innerHTML='';
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-cell';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=document.createElement('div');e.className='cal-cell';e.textContent=d;
    if(availDates.includes(ds)){e.classList.add('has');e.addEventListener('click',()=>loadDate(ds));}
    if(ds===curDate)e.classList.add('sel');
    if(d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear())e.classList.add('today');
    grid.appendChild(e);
  }
}
document.getElementById('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
document.getElementById('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};

function loadDate(ds){
  curDate=ds;renderCal();
  const d=new Date(ds+'T00:00:00');
  document.getElementById('sideDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const dayRows=allRows.filter(r=>r.date===ds);
  const dayCharts=allChartRows.filter(r=>r.date===ds);
  const dayMedia=allMediaRows.find(r=>r.date===ds)||null;
  const data={optics:{items:[],charts:[]},space:{items:[],charts:[]},domestic:{items:[],charts:[]},intl:{items:[],charts:[]}};
  dayRows.forEach(row=>{
    const sec=row.section;if(!data[sec])return;
    data[sec].items.push({tag:row.tag,sourceLabel:row.source_label,title:row.title,detail:row.detail,insight:row.insight,source:row.url});
  });
  dayCharts.forEach(row=>{
    const sec=row.section;if(!data[sec])return;
    try{
      const labels=JSON.parse(row.labels_json||'[]');
      const raw=JSON.parse(row.data_json||'[]');
      if(Array.isArray(raw)&&raw.length&&typeof raw[0]==='object'){
        data[sec].charts.push({title:row.title,type:row.type||'bar',dataset_label:row.unit||'',labels,datasets:raw});
      }else{
        data[sec].charts.push({title:row.title,type:row.type||'bar',dataset_label:row.unit||'',labels,data:raw});
      }
    }catch(e){}
  });
  renderAll(data,dayMedia);
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseLine(lines[0]);
  return lines.slice(1).map(line=>{
    const fields=parseLine(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(fields[i]||'').trim();});
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}
function parseLine(line){
  const fields=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'&&!inQ){inQ=true;}
    else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'&&inQ){inQ=false;}
    else if(c===','&&!inQ){fields.push(cur);cur='';}
    else{cur+=c;}
  }
  fields.push(cur);
  return fields.map(f=>f.trim());
}

// ── シート読み込み ─────────────────────────────────
async function fetchSheet(name){
  const r=await fetch(BASE+encodeURIComponent(name));
  if(!r.ok)throw new Error('HTTP '+r.status);
  const t=await r.text();
  if(!t||t.trim().startsWith('<!'))throw new Error('HTMLが返却されました。スプレッドシートの共有設定を確認してください');
  return parseCSV(t);
}

async function loadAll(){
  const el=document.getElementById('sheetStatus');
  try{
    const[articles,charts,media]=await Promise.all([
      fetchSheet('articles'),
      fetchSheet('charts').catch(()=>[]),
      fetchSheet('media').catch(()=>[]),
    ]);
    allArticles=articles;allCharts=charts;allMedia=media;
    availDates=[...new Set(allArticles.map(r=>r.date).filter(d=>/^\d{4}-\d{2}-\d{2}$/.test(d)))];
    allMedia.forEach(r=>{if(/^\d{4}-\d{2}-\d{2}$/.test(r.date)&&!availDates.includes(r.date))availDates.push(r.date);});
    availDates.sort();
    el.textContent='✓ 接続済み（記事'+allArticles.length+'件 / '+availDates.length+'日分）';
    el.className='sheet-status ok';
    renderCal();
    if(availDates.length)loadDate(availDates[availDates.length-1]);
  }catch(e){
    el.innerHTML='⚠ 読み込み失敗：'+esc(e.message);
    el.className='sheet-status err';
    console.warn(e);
  }
}

// ── カレンダー ─────────────────────────────────────
function initCal(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function renderCal(){
  document.getElementById('calLbl').textContent=calY+'年'+(calM+1)+'月';
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  const today=new Date(),grid=document.getElementById('calDates');
  grid.innerHTML='';
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-cell';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el=document.createElement('div');el.className='cal-cell';el.textContent=d;
    if(availDates.includes(ds)){el.classList.add('has');el.addEventListener('click',()=>loadDate(ds));}
    if(ds===curDate)el.classList.add('sel');
    if(d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear())el.classList.add('today');
    grid.appendChild(el);
  }
}
document.getElementById('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
document.getElementById('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};

// ── 日付選択 ──────────────────────────────────────
function loadDate(ds){
  curDate=ds;renderCal();
  const d=new Date(ds+'T00:00:00');
  document.getElementById('sideDate').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  const arts=allArticles.filter(r=>r.date===ds);
  const chs=allCharts.filter(r=>r.date===ds);
  const med=allMedia.find(r=>r.date===ds)||null;
  renderAll(arts,chs,med);
}

// ── 全体レンダリング ───────────────────────────────
function renderAll(articles,charts,media){
  let total=0;
  THEMES.forEach((t,i)=>{
    const items=articles.filter(r=>r.section===t.key);

    document.getElementById('b'+i).textContent=items.length;
    renderKw(i,t.kws);
    renderNews(i,t,items);

  });

  document.getElementById('sideBadge').classList.toggle('on',total>0);

}

function renderKw(i,kws){

  kws.forEach((k,j)=>{
    if(j){const s=document.createElement('span');s.className='kw-sep';s.textContent='・';c.appendChild(s);}

function renderNews(i,theme,items){

    card.innerHTML='<div class="ncard-body">'
      +'<div class="ncard-meta"><span class="ntag '+theme.cls+'">'+esc(item.tag||theme.label)+'</span><span class="nmedia">'+esc(item.source_label||'')+'</span></div>'
      +'<div class="ntitle">'+esc(item.title)+'</div>'
      +'<div class="nbody">'+esc(item.detail)+'</div>'

function renderCharts(i,chartRows){
  const wrap=document.getElementById('ch'+i);wrap.innerHTML='';
  if(!chartRows.length)return;
  const hd=document.createElement('div');hd.className='charts-hd';hd.textContent='市場予測・データチャート';wrap.appendChild(hd);
  chartRows.forEach(ch=>{
    const card=document.createElement('div');card.className='chart-card';
    const cid='c_'+Math.random().toString(36).slice(2);
    card.innerHTML='<div class="chart-card-ttl">'+esc(ch.title)+'</div><div class="chart-card-sub">単位：'+esc(ch.unit||'')+'</div><div class="chart-wrap"><canvas id="'+cid+'"></canvas></div>';
    wrap.appendChild(card);
    try{
      const labels=JSON.parse(ch.labels_json||'[]');
      const raw=JSON.parse(ch.data_json||'[]');
      const isBar=ch.type==='bar';
      let datasets;
      if(Array.isArray(raw)&&raw.length&&typeof raw[0]==='object'){
        datasets=raw.map((ds,j)=>({label:ds.label||'',data:ds.data||[],borderColor:PAL[j%PAL.length],backgroundColor:PAL[j%PAL.length]+(isBar?'55':'18'),borderWidth:2,tension:0.4,fill:!isBar,pointRadius:3,pointBackgroundColor:PAL[j%PAL.length]}));
      }else{
        datasets=[{label:ch.unit||'',data:raw,borderColor:PAL[0],backgroundColor:PAL[0]+(isBar?'55':'18'),borderWidth:2,tension:0.4,fill:!isBar,pointRadius:3,pointBackgroundColor:PAL[0]}];
      }
      if(CI[cid])CI[cid].destroy();
      CI[cid]=new Chart(document.getElementById(cid).getContext('2d'),{
        type:isBar?'bar':'line',data:{labels,datasets},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:datasets.length>1,position:'bottom',labels:{font:{size:10,family:'Noto Sans JP'},padding:12,boxWidth:12}},tooltip:{backgroundColor:'#fff',borderColor:'#e5e7eb',borderWidth:1,titleColor:'#374151',bodyColor:'#374151'}},
          scales:{x:{grid:{color:'#f3f4f6'},ticks:{color:'#6b7280',font:{size:10}},border:{color:'#e5e7eb'}},y:{grid:{color:'#f3f4f6'},ticks:{color:'#6b7280',font:{size:10}},border:{color:'#e5e7eb'}}}}

}

function renderAudio(media){
  const wrap=document.getElementById('audioWrap');
  if(!media||!media.audio_url){
    wrap.innerHTML='<div class="audio-none">この日の音声解説はありません</div>';
    return;
  }

  const rawUrl=media.audio_url;
  // DriveファイルIDを抽出
  const m=rawUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)||rawUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const fileId=m?m[1]:null;

  // Google DriveはCORSブロックのため<audio>タグでは直接再生不可
  // → /preview URLをiframeで埋め込む（最も確実）
  if(fileId){
    const previewUrl=`https://drive.google.com/file/d/${fileId}/preview`;
    const driveUrl=`https://drive.google.com/file/d/${fileId}/view`;
    wrap.innerHTML=`
      <div class="aplayer">
        <div class="aplayer-title">🎙 音声ポッドキャスト</div>
        <iframe
          src="${previewUrl}"
          allow="autoplay"
          allowfullscreen
          style="width:100%;height:72px;border:none;border-radius:8px;display:block;background:#f5f0ff;"
        ></iframe>
        <a class="adrive-link" href="${driveUrl}" target="_blank" rel="noopener">
          ☁ Google Driveで開く（別タブ）
        </a>
      </div>`;
  } else {
    // Drive以外のURL（直接再生を試みる）
    wrap.innerHTML=`
      <div class="aplayer">
        <div class="aplayer-title">🎙 音声ポッドキャスト</div>
        <audio controls preload="metadata"
          style="width:100%;height:40px;display:block;margin-bottom:4px;accent-color:#7c3aed;">
          <source src="${rawUrl}">
        </audio>
      </div>`;
  }
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

(async()=>{initCal();await loadAll();setTimeout(()=>document.getElementById('loading').classList.add('out'),600);})();
</script>
