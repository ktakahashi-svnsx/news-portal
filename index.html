<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光・宇宙・政治 ニュースポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --red:#dc2626;--red-lt:#fef2f2;--purple:#7c3aed;
  --green:#059669;--blue:#2563eb;
  --bg:#f1f3f6;--white:#fff;--border:#e2e5ea;
  --text:#111827;--muted:#6b7280;--sidebar-w:210px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading.out{opacity:0;pointer-events:none}
.ld-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--red),#f87171);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:18px;animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.ld-text{font-size:13px;color:var(--muted);margin-bottom:14px}
.ld-bar{width:160px;height:3px;background:#f3f4f6;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--red);border-radius:2px;animation:ldf 1.6s ease-in-out infinite}
@keyframes ldf{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.hdr{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--red),#f87171);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0}
.hdr-title h1{font-size:14px;font-weight:700;line-height:1.2;font-family:'Oswald',sans-serif;letter-spacing:.03em}
.hdr-title p{font-size:10px;color:var(--muted)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.hdr-live{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.wrap{display:flex;flex:1;min-height:0}
.side{width:var(--sidebar-w);flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto}
.side-inner{padding:14px 12px;display:flex;flex-direction:column;gap:14px}
.side-date-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.side-date-val{font-size:19px;font-weight:700;line-height:1.1;font-family:'Oswald',sans-serif}
.side-badge{display:none;align-items:center;gap:4px;font-size:10px;color:var(--red);font-weight:600;margin-top:4px}
.side-badge.on{display:flex}
.side-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red)}
.cal{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#fafafa;border-bottom:1px solid var(--border)}
.cal-hd-lbl{font-size:12px;font-weight:700;font-family:'Oswald',sans-serif}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;border-radius:5px;transition:background .12s;line-height:1}
.cal-nav:hover{background:#f3f4f6;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 6px 8px;gap:2px}
.cal-dh{text-align:center;font-size:9px;color:var(--muted);padding:2px 0;font-weight:600}
.cal-cell{text-align:center;font-size:10px;color:#c9cdd5;padding:5px 1px;border-radius:5px;cursor:default;line-height:1;position:relative;transition:background .1s}
.cal-cell.has{color:var(--text);cursor:pointer;font-weight:600}
.cal-cell.has:hover{background:var(--red-lt);color:var(--red)}
.cal-cell.sel{background:var(--red)!important;color:#fff!important;font-weight:700}
.cal-cell.today:not(.sel){outline:1.5px solid var(--red);color:var(--red);font-weight:600}
.cal-cell.has:not(.sel)::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--red)}
.cal-leg{display:flex;gap:10px;padding:2px 8px 7px;font-size:9px;color:var(--muted)}
.cal-leg span{display:flex;align-items:center;gap:3px}
.leg-dot{width:5px;height:5px;border-radius:50%;background:var(--red)}
.leg-sq{width:9px;height:9px;border-radius:2px;outline:1.5px solid var(--red)}
.sb-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:8px}
.pdf-card{background:#fafafa;border:1px solid var(--border);border-radius:9px;padding:9px 10px;margin-bottom:7px}
.pdf-card-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pdf-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pdf-ico.t{background:#dbeafe}.pdf-ico.p{background:#fce7f3}
.pdf-name{font-size:10px;color:#374151;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:118px}
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:6px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;transition:opacity .15s;text-decoration:none}
.pdf-btn:hover{opacity:.85}
.pdf-btn.off{background:#d1d5db;cursor:not-allowed;pointer-events:none}
.audio-card{background:#fafafa;border:1px solid var(--border);border-radius:9px;padding:9px 10px}
.audio-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.audio-ico{width:30px;height:30px;background:#f3e8ff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.audio-name{font-size:10px;color:#374151;line-height:1.4}
.audio-none{font-size:10px;color:var(--muted);text-align:center;padding:2px 0}
/* Reload notice */
.reload-notice{display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 10px;font-size:10px;color:#92400e;line-height:1.5;margin-top:-6px}
.reload-notice.on{display:block}
.main{flex:1;min-width:0;padding:16px 20px;overflow-y:auto}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:22px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:500;color:#374151;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.tab:hover{border-color:var(--red);color:var(--red)}
.tab.act{color:#fff;border-color:transparent}
.tab[data-i="0"].act{background:var(--red)}
.tab[data-i="1"].act{background:var(--purple)}
.tab[data-i="2"].act{background:var(--green)}
.tab[data-i="3"].act{background:var(--blue)}
.tab-ico{font-size:13px}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:9px;font-size:10px;font-weight:700;background:rgba(0,0,0,.12)}
.tab.act .tab-badge{background:rgba(255,255,255,.28)}
.panel{display:none}.panel.act{display:block;animation:fin .2s}
@keyframes fin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.kw-bar{background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kw-ico{color:var(--muted);font-size:12px;flex-shrink:0}
.kw-tag{font-size:11px;color:#4b5563;cursor:pointer;padding:1px 0;border-bottom:1px dashed transparent;transition:all .12s}
.kw-tag:hover{color:var(--red);border-bottom-color:var(--red)}
.kw-sep{color:#d1d5db}
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
@media(max-width:1080px){.ngrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.ngrid{grid-template-columns:1fr}}
.ncard{background:var(--white);border:1px solid var(--border);border-radius:11px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,transform .15s}
.ncard:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-2px)}
.ncard-body{padding:13px;flex:1;display:flex;flex-direction:column}
.ncard-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ntag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.ntag.t0{background:#fef2f2;color:var(--red)}
.ntag.t1{background:#f5f3ff;color:var(--purple)}
.ntag.t2{background:#ecfdf5;color:var(--green)}
.ntag.t3{background:#eff6ff;color:var(--blue)}
.nmedia{font-size:10px;color:var(--muted)}
.ntitle{font-size:13px;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:7px}
.nbody{font-size:11px;color:#4b5563;line-height:1.8;margin-bottom:8px;flex:1}
.ninsight{background:#eff6ff;border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:7px 9px;margin-bottom:8px;font-size:11px;color:#1e3a8a;line-height:1.7}
.ninsight::before{content:'☞ ';font-weight:700}
.nurl{font-size:10px;color:var(--muted);word-break:break-all;margin-top:auto}
.nurl a{color:var(--muted);text-decoration:none}
.nurl a:hover{color:var(--red)}
.no-news{grid-column:1/-1;text-align:center;padding:52px 20px;color:var(--muted)}
.no-news-ico{font-size:44px;margin-bottom:10px;opacity:.35}
.charts-sec{margin-bottom:8px}
.charts-hd{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.charts-hd::before{content:'';width:3px;height:14px;background:var(--red);border-radius:2px}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:12px}
.chart-card-ttl{font-size:12px;font-weight:700;color:#374151;margin-bottom:2px}
.chart-card-sub{font-size:10px;color:var(--muted);margin-bottom:12px}
.chart-wrap{height:220px;position:relative}
/* Sheet status */
.sheet-status{font-size:10px;padding:5px 8px;border-radius:6px;margin-top:8px;display:none}
.sheet-status.ok{display:block;background:#ecfdf5;color:#065f46}
.sheet-status.err{display:block;background:var(--red-lt);color:#991b1b}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-logo">☀</div>
  <div class="ld-text">ニュースを読み込んでいます...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<header class="hdr">
  <div class="hdr-logo">☀</div>
  <div class="hdr-title">
    <h1>光・宇宙・政治 ニュースポータル</h1>
    <p>光学 ／ 宇宙・防衛 ／ 国内政治 ／ 海外政治</p>
  </div>
  <div class="hdr-right"><div class="hdr-live"></div><span>日別ニュース</span></div>
</header>

<div class="wrap">
  <aside class="side">
    <div class="side-inner">
      <div>
        <div class="side-date-lbl">選択中の日付</div>
        <div class="side-date-val" id="sideDate">—</div>
        <div class="side-badge" id="sideBadge">レポートあり（<span id="topicCnt">0</span>トピック）</div>
        <div class="sheet-status" id="sheetStatus"></div>
      </div>

      <div class="cal">
        <div class="cal-hd">
          <button class="cal-nav" id="calPrev">‹</button>
          <span class="cal-hd-lbl" id="calLbl"></span>
          <button class="cal-nav" id="calNext">›</button>
        </div>
        <div class="cal-grid">
          <div class="cal-dh">日</div><div class="cal-dh">月</div>
          <div class="cal-dh">火</div><div class="cal-dh">水</div>

          <div class="cal-dh">土</div>
          <div id="calDates" style="display:contents"></div>
        </div>

          <span><div class="leg-dot"></div>データあり</span>

      <!-- Sheet設定（初回のみ） -->
      <div id="sheetSetup" style="display:none">
        <div class="sb-lbl">スプレッドシート設定</div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.6">
          スプレッドシートを「ウェブに公開」するとデータが表示されます。
        </div>
        <input id="csvUrl" type="text" placeholder="CSVのURLを貼り付け" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:10px;margin-bottom:6px">
        <button onclick="saveSheetUrl()" style="width:100%;padding:6px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">設定を保存</button>
      </div>

      <div>
        <div class="sb-lbl">ダウンロード</div>
        <div class="pdf-card">
          <div class="pdf-card-top"><div class="pdf-ico t">📘</div><div class="pdf-name" id="pdfTechName">技術系レポート</div></div>
          <a class="pdf-btn off" id="pdfTechBtn">⬇ PDFをダウンロード</a>
        </div>
        <div class="pdf-card">
          <div class="pdf-card-top"><div class="pdf-ico p">📕</div><div class="pdf-name" id="pdfPolName">政治情勢レポート</div></div>
          <a class="pdf-btn off" id="pdfPolBtn">⬇ PDFをダウンロード</a>
        </div>
      </div>

      <div>
        <div class="sb-lbl">音声解説</div>
        <div class="audio-card">
          <div class="audio-top"><div class="audio-ico">🎙</div><div class="audio-name">音声ポッドキャスト</div></div>
          <div id="audioWrap"><div class="audio-none">音声なし</div></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="tabs">
      <button class="tab act" data-i="0"><span class="tab-ico">☀</span>光学・光アプリケーション<span class="tab-badge" id="b0">0</span></button>
      <button class="tab" data-i="1"><span class="tab-ico">🛰</span>宇宙・防衛・核融合<span class="tab-badge" id="b1">0</span></button>
      <button class="tab" data-i="2"><span class="tab-ico">🏛</span>国内政治<span class="tab-badge" id="b2">0</span></button>
      <button class="tab" data-i="3"><span class="tab-ico">🌐</span>海外政治<span class="tab-badge" id="b3">0</span></button>
    </div>
    <div class="panel act" id="p0"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw0" style="display:contents"></span></div><div class="ngrid" id="ng0"></div><div class="charts-sec" id="ch0"></div></div>
    <div class="panel" id="p1"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw1" style="display:contents"></span></div><div class="ngrid" id="ng1"></div><div class="charts-sec" id="ch1"></div></div>
    <div class="panel" id="p2"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw2" style="display:contents"></span></div><div class="ngrid" id="ng2"></div><div class="charts-sec" id="ch2"></div></div>
    <div class="panel" id="p3"><div class="kw-bar"><span class="kw-ico">🔖</span><span id="kw3" style="display:contents"></span></div><div class="ngrid" id="ng3"></div><div class="charts-sec" id="ch3"></div></div>
  </main>
</div>

<script>
// ─── Config ───────────────────────────────────────────
// スプレッドシートID（固定）
const SHEET_ID = '1D5GDqcSrJj6_SGk3OlnTDqoBL0su03t9Yi5McGTb578';

// Google Sheets CSV公開URL（シート名「articles」）
// ※スプレッドシートを「ファイル→共有→ウェブに公開」してから使う
function getCsvUrl() {
  const saved = localStorage.getItem('sheet_csv_url');
  if (saved) return saved;
  // デフォルト：articlesシートをCSV公開
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=articles`;
}
function getChartsCsvUrl() {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=charts`;
}

const THEMES=[
  {key:'optics',  label:'光学',    cls:'t0', kws:['フォトニクス','シリコンフォトニクス','光電融合','LiDAR','CPO']},
  {key:'space',   label:'宇宙',    cls:'t1', kws:['衛星','防衛','核融合','レーザー','宇宙開発']},
  {key:'domestic',label:'国内政治',cls:'t2', kws:['国会','閣議','与党','野党','経済安保']},
  {key:'intl',    label:'海外政治',cls:'t3', kws:['米中','欧州','地政学','輸出規制','外交']},
];
const PAL=['#dc2626','#2563eb','#059669','#f59e0b','#7c3aed','#0891b2'];
let curDate=null, availDates=[], calY, calM, allRows=[], allChartRows=[];
const CI={};

// ─── CSV parser ───────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas inside
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) { inQ = true; }
      else if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"' && inQ) { inQ = false; }
      else if (c === ',' && !inQ) { fields.push(cur); cur = ''; }
      else { cur += c; }
    }
    fields.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (fields[i] || '').trim(); });
    return obj;
  }).filter(r => r.date);
}

// ─── Load from Sheets ─────────────────────────────────
async function loadFromSheets() {
  const statusEl = document.getElementById('sheetStatus');
  const setupEl  = document.getElementById('sheetSetup');

  // Try 3 URL patterns in order
  const urlPatterns = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=articles`,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`,
    getCsvUrl(), // user-saved custom URL
  ];

  let lastErr = '';
  for (const url of urlPatterns) {
    try {
      const r = await fetch(url);
      if (!r.ok) { lastErr = `HTTP ${r.status} (${url})`; continue; }
      const text = await r.text();
      if (!text || text.trim().startsWith('<!')) { lastErr = 'HTMLが返却されました（公開設定を確認してください）'; continue; }
      allRows = parseCSV(text);
      if (!allRows.length) { lastErr = 'データ0件（シート名・列名を確認してください）'; continue; }

      availDates = [...new Set(allRows.map(r => r.date).filter(Boolean))].sort();

      // Charts sheet
      try {
        const chartUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=charts`;
        const cr = await fetch(chartUrl);
        if (cr.ok) {
          const ct = await cr.text();
          if (!ct.startsWith('<!')) allChartRows = parseCSV(ct);
        }
      } catch {}

      statusEl.textContent = `✓ スプレッドシート接続済み（記事${allRows.length}件 / ${availDates.length}日分）`;
      statusEl.className = 'sheet-status ok';
      setupEl.style.display = 'none';
      return true;
    } catch(e) {
      lastErr = e.message;
    }
  }

  // All failed
  console.warn('Sheet load failed:', lastErr);
  statusEl.innerHTML = `⚠ 読み込み失敗：${lastErr}<br><small>スプレッドシートの「共有」→「リンクを知っている全員」に設定してください</small>`;
  statusEl.className = 'sheet-status err';
  setupEl.style.display = 'block';
  return false;
}

function saveSheetUrl() {
  const url = document.getElementById('csvUrl').value.trim();
  if (!url) return;
  localStorage.setItem('sheet_csv_url', url);
  init();
}

// ─── Calendar ─────────────────────────────────────────
function initCal(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function renderCal(){
  document.getElementById('calLbl').textContent=`${calY}年${calM+1}月`;
  const first=new Date(calY,calM,1).getDay(), days=new Date(calY,calM+1,0).getDate();
  const today=new Date(), grid=document.getElementById('calDates');
  grid.innerHTML='';
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-cell';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div');el.className='cal-cell';el.textContent=d;
    if(availDates.includes(ds)){el.classList.add('has');el.addEventListener('click',()=>loadDate(ds));}
    if(ds===curDate)el.classList.add('sel');
    if(d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear())el.classList.add('today');
    grid.appendChild(el);
  }
}
document.getElementById('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
document.getElementById('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};

// ─── Load date ────────────────────────────────────────
function loadDate(ds) {
  curDate = ds; renderCal();
  const d = new Date(ds+'T00:00:00');
  document.getElementById('sideDate').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

  // Filter rows for this date
  const dayRows = allRows.filter(r => r.date === ds);
  const dayCharts = allChartRows.filter(r => r.date === ds);

  // Build data structure from CSV rows
  const data = {optics:{items:[],charts:[]},space:{items:[],charts:[]},domestic:{items:[],charts:[]},intl:{items:[],charts:[]}};
  dayRows.forEach(row => {
    const sec = row.section;
    if (!data[sec]) return;
    data[sec].items.push({
      tag: row.tag || '',
      sourceLabel: row.source_label || '',
      title: row.title || '',
      detail: row.detail || '',
      insight: row.insight || '',
      source: row.url || '',
    });
  });
  dayCharts.forEach(row => {
    const sec = row.section;
    if (!data[sec]) return;
    try {
      const labels = JSON.parse(row.labels_json || '[]');
      let rawData = JSON.parse(row.data_json || '[]');
      // rawData could be array of numbers or array of {label,data} objects
      if (Array.isArray(rawData) && rawData.length && typeof rawData[0] === 'object') {
        data[sec].charts.push({title:row.title,type:row.type||'bar',dataset_label:row.unit||'',labels,datasets:rawData});
      } else {
        data[sec].charts.push({title:row.title,type:row.type||'bar',dataset_label:row.unit||'',labels,data:rawData});
      }
    } catch {}
  });
  renderAll(data, ds);
}

// ─── Render ───────────────────────────────────────────
function renderAll(data, ds) {
  let total=0;
  THEMES.forEach((t,i)=>{
    const d=data?.[t.key]||null;
    const cnt=d?.items?.length||0;total+=cnt;
    document.getElementById(`b${i}`).textContent=cnt;
    renderKw(i,t.kws,d?.keywords);
    renderNews(i,t,d);
    renderCharts(i,t,d);
  });
  document.getElementById('topicCnt').textContent=total;
  document.getElementById('sideBadge').classList.toggle('on',total>0);
  renderPDFs(data?.pdfs,ds);
  renderAudio(data?.audio);
}
function renderKw(i,defs,extra){
  const c=document.getElementById(`kw${i}`);c.innerHTML='';
  (extra?.length?extra:defs).forEach((k,j)=>{
    if(j){const s=document.createElement('span');s.className='kw-sep';s.textContent='・';c.appendChild(s);}
    const sp=document.createElement('span');sp.className='kw-tag';sp.textContent=k;c.appendChild(sp);
  });
}
function renderNews(i,theme,data){
  const grid=document.getElementById(`ng${i}`);grid.innerHTML='';
  const items=data?.items||[];
  if(!items.length){grid.innerHTML=`<div class="no-news"><div class="no-news-ico">📭</div><div>この日のニュースはまだありません</div></div>`;return;}
  items.forEach(item=>{
    const card=document.createElement('div');card.className='ncard';
    const ins=item.insight?`<div class="ninsight">${item.insight}</div>`:'';
    const url=item.source?`<div class="nurl"><a href="${item.source}" target="_blank" rel="noopener">${item.source.length>55?item.source.slice(0,55)+'…':item.source}</a></div>`:'';
    card.innerHTML=`<div class="ncard-body">
      <div class="ncard-meta"><span class="ntag ${theme.cls}">${item.tag||theme.label}</span><span class="nmedia">${item.sourceLabel||''}</span></div>
      <div class="ntitle">${item.title}</div>
      <div class="nbody">${item.detail}</div>${ins}${url}
    </div>`;
    grid.appendChild(card);
  });
}
function renderCharts(i,theme,data){
  const wrap=document.getElementById(`ch${i}`);wrap.innerHTML='';
  const charts=data?.charts||[];if(!charts.length)return;
  const hd=document.createElement('div');hd.className='charts-hd';hd.textContent='市場予測・データチャート';wrap.appendChild(hd);
  charts.forEach(ch=>{
    const card=document.createElement('div');card.className='chart-card';
    const cid='c_'+Math.random().toString(36).slice(2);
    card.innerHTML=`<div class="chart-card-ttl">${ch.title}</div><div class="chart-card-sub">単位：${ch.dataset_label||''}</div><div class="chart-wrap"><canvas id="${cid}"></canvas></div>`;
    wrap.appendChild(card);
    const ctx=document.getElementById(cid).getContext('2d');
    if(CI[cid])CI[cid].destroy();
    const isBar=ch.type==='bar';
    let datasets;
    if(ch.datasets){datasets=ch.datasets.map((ds,j)=>({label:ds.label,data:ds.data,borderColor:PAL[j%PAL.length],backgroundColor:PAL[j%PAL.length]+(isBar?'44':'18'),borderWidth:2,tension:0.4,fill:!isBar,pointRadius:3,pointBackgroundColor:PAL[j%PAL.length]}));}
    else{datasets=[{label:ch.dataset_label||'',data:ch.data||[],borderColor:PAL[0],backgroundColor:PAL[0]+(isBar?'44':'18'),borderWidth:2,tension:0.4,fill:!isBar,pointRadius:3,pointBackgroundColor:PAL[0]}];}
    CI[cid]=new Chart(ctx,{type:isBar?'bar':'line',data:{labels:ch.labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:!!ch.datasets,position:'bottom',labels:{font:{size:10,family:'Noto Sans JP'},padding:12,boxWidth:12}},tooltip:{backgroundColor:'#fff',borderColor:'#e5e7eb',borderWidth:1,titleColor:'#374151',bodyColor:'#374151'}},scales:{x:{grid:{color:'#f3f4f6'},ticks:{color:'#6b7280',font:{size:10}},border:{color:'#e5e7eb'}},y:{grid:{color:'#f3f4f6'},ticks:{color:'#6b7280',font:{size:10}},border:{color:'#e5e7eb'}}}}});
  });
}
function renderPDFs(pdfs,ds){
  const tBtn=document.getElementById('pdfTechBtn'),pBtn=document.getElementById('pdfPolBtn');
  [tBtn,pBtn].forEach(b=>{b.classList.add('off');b.removeAttribute('href');b.removeAttribute('download');});
  (pdfs||[]).forEach(pdf=>{
    const btn=pdf.type==='tech'?tBtn:pBtn;
    btn.classList.remove('off');btn.href=pdf.url;btn.setAttribute('download','');
    document.getElementById(pdf.type==='tech'?'pdfTechName':'pdfPolName').textContent=pdf.sublabel||pdf.label;
  });
}
function renderAudio(audio){
  document.getElementById('audioWrap').innerHTML=audio
    ?`<audio controls style="width:100%;height:28px;" src="${audio.url}"></audio>`
    :`<div class="audio-none">音声なし</div>`;
}

// ─── Tabs ─────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const i=btn.dataset.i;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
    btn.classList.add('act');document.getElementById(`p${i}`).classList.add('act');
  });
});

// ─── Init ─────────────────────────────────────────────
async function init() {
  initCal();
  const ok = await loadFromSheets();
  if (ok && availDates.length) {
    renderCal();
    loadDate(availDates[availDates.length-1]);
  } else if (!ok) {
    // Fallback: localStorage
    try {
      const idx = JSON.parse(localStorage.getItem('news_index')||'{"dates":[]}');
      availDates = idx.dates || [];
      if (availDates.length) {
        renderCal();
        const ds = availDates[availDates.length-1];
        curDate = ds; renderCal();
        const d = new Date(ds+'T00:00:00');
        document.getElementById('sideDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        const stored = localStorage.getItem(`news_${ds}`);
        if (stored) renderAll(JSON.parse(stored), ds);
      }
    } catch {}
  }
  setTimeout(()=>document.getElementById('loading').classList.add('out'), 700);
}
init();
</script>
