<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移転のお知らせ｜光学ビジネス ニュースポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#dc2626;--red-lt:#fef2f2;--bg:#f1f3f6;--white:#fff;--border:#e2e5ea;--text:#111827;--muted:#6b7280}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:7px}
.hdr-logo-bar{width:4px;height:22px;background:var(--red);border-radius:2px}
.hdr-logo-txt{font-family:'Oswald','Noto Sans JP',sans-serif;font-size:17px;font-weight:700;color:#1a1a1a;letter-spacing:.02em;line-height:1}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);max-width:560px;width:100%;padding:44px 40px;text-align:center}
.card-mark{display:inline-flex;align-items:center;gap:9px;margin-bottom:26px}
.card-mark-bar{width:6px;height:34px;background:var(--red);border-radius:2px}
.card-mark-txt{font-family:'Oswald','Noto Sans JP',sans-serif;font-size:26px;font-weight:700;color:#1a1a1a;letter-spacing:.02em;line-height:1}
.badge{display:inline-block;background:var(--red-lt);color:var(--red);font-size:11px;font-weight:700;letter-spacing:.06em;padding:5px 13px;border-radius:20px;margin-bottom:20px}
h1{font-size:22px;font-weight:700;line-height:1.5;margin-bottom:18px;font-family:'Noto Sans JP',sans-serif}
.lead{font-size:14px;color:#374151;line-height:1.9;margin-bottom:12px}
.note{font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:30px}
.divider{height:1px;background:var(--border);margin:0 0 30px}
.new-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--red);color:#fff;text-decoration:none;font-size:15px;font-weight:700;padding:15px 30px;border-radius:10px;transition:all .18s;box-shadow:0 3px 12px rgba(220,38,38,.28);line-height:1.4}
.btn:hover{background:#b91c1c;transform:translateY(-1px);box-shadow:0 5px 16px rgba(220,38,38,.34)}
.btn-arrow{font-size:17px;transition:transform .18s}
.btn:hover .btn-arrow{transform:translateX(3px)}
.btn-url{display:block;font-size:12px;color:var(--muted);margin-top:16px;word-break:break-all;line-height:1.6}
.btn-url a{color:var(--muted);text-decoration:none;border-bottom:1px dotted #c9cdd5}
.btn-url a:hover{color:var(--red);border-bottom-color:var(--red)}
.auto{font-size:11px;color:#9ca3af;margin-top:26px;line-height:1.7}

.site-footer{background:#2d2d2d;color:#d1d5db;font-size:12px;padding:22px 20px 18px}
.site-footer-inner{max-width:900px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.site-footer-logo-txt{font-family:'Oswald','Noto Sans JP',sans-serif;font-size:20px;font-weight:700;color:#e5e7eb;letter-spacing:.04em}
.site-footer-copy{font-size:11px;color:#9ca3af}

@media(max-width:600px){.card{padding:34px 22px}h1{font-size:19px}.card-mark-txt{font-size:22px}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-bar"></div>
    <div class="hdr-logo-txt">SEVENSIX</div>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-mark">
      <div class="card-mark-bar"></div>
      <div class="card-mark-txt">SEVENSIX</div>
    </div>

    <span class="badge">サイト移転のお知らせ</span>
    <h1>「光学ビジネス ニュースポータル」は<br>移転いたしました</h1>

    <p class="lead">
      いつもご利用いただきありがとうございます。<br>
      本サイトは閉鎖し、下記の新しいURLへ移転いたしました。
    </p>
    <p class="note">
      お手数ですが、ブックマークの変更をお願い申し上げます。
    </p>

    <div class="divider"></div>

    <p class="new-lbl">新しいURL</p>
    <a class="btn" href="https://www.sevensix.co.jp/newsportal/">
      新しいポータルへ移動する
      <span class="btn-arrow">→</span>
    </a>
    <p class="btn-url">
      <a href="https://www.sevensix.co.jp/newsportal/">https://www.sevensix.co.jp/newsportal/</a>
    </p>

    <p class="auto">数秒後に自動的に新しいページへ移動します。<br>移動しない場合は上のボタンをクリックしてください。</p>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <div class="site-footer-logo-txt">SEVENSIX</div>
    <div class="site-footer-copy">© Sevensix Inc. All rights reserved.</div>
  </div>
</footer>

<script>
setTimeout(function(){
  window.location.href = "https://www.sevensix.co.jp/newsportal/";
}, 6000);
</script>
</body>
</html>
